<!DOCTYPE html>
<html>
<head>
  <title>Modern Login</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
      margin-top: 80px;
    }

    .page { display: none; }
    .active { display: block; }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    .card {
      background: white;
      width: 320px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="page active card">
  <h2>Login</h2>

  <input id="email" placeholder="Gmail">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<!-- LOADING PAGE -->
<div id="loadingPage" class="page card">
  <h2>Processing...</h2>
  <p>Please wait 1 minute</p>
</div>

<!-- RESULT PAGE -->
<div id="resultPage" class="page card">
  <h2>Excel Data</h2>
  <p id="msg">Loading...</p>
</div>

<script src="app.js"></script>

</body>
</html>
