<!DOCTYPE html>
<html>
<head>
  <title>Login Flow System</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
    }

    .page {
      display: none;
    }

    .active {
      display: block;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- PAGE 1 -->
<div id="loginPage" class="page active">
  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="startProcess()">Login</button>
</div>

<!-- PAGE 2 -->
<div id="loadingPage" class="page">
  <h2>Loading...</h2>
  <p>Please wait 1 minute</p>
</div>

<!-- PAGE 3 -->
<div id="resultPage" class="page">
  <h2>Message from Google Sheet</h2>
  <p id="msg">Loading...</p>
</div>

<script src="app.js"></script>

</body>
</html>
