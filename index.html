<!DOCTYPE html>
<html>
<head>
  <title>Modern Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <!-- ✅ Message area -->
  <p id="msg" style="margin-top:15px; color:#333; font-weight:500;">
    <!-- message will appear here -->
  </p>
</div>

<script src="app.js"></script>

<script>
  // ✅ Optional: Load message automatically on page load
  async function loadMessage() {
    try {
      const res = await fetch("https://script.google.com/macros/s/AKfycbzT7uISsv4-oZ8eKRmINKCDlhtxLSPGPSGYAhqaMVVj7qOpNMDUZ6zozqo6dWyiNJP1/exec");
      const data = await res.json();

      document.getElementById("msg").innerText = data.message;
    } catch (err) {
      console.log("No message loaded");
    }
  }

  loadMessage(); // run on page open
</script>

</body>
</html>
